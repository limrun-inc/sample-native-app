# In your existing workflow
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Preview
        uses: limrun-inc/ios-preview-action@build-settings-pivot
        with:
          api-key: ${{ secrets.LIM_API_KEY }}
          project-path: .
          build-settings: |
            SWIFT_ACTIVE_COMPILATION_CONDITIONS=$(inherited) LIMRUN
            APP_CONFIG_VALIDATION_MARKER=limrun-bs-validation
